<% require "dotenv"; Dotenv.load(".env") %>

# Generic template - real infrastructure (hosts, domains) lives in the
# gitignored destination overlay config/deploy.prod.yml, same as the
# daemon repos. Deploy with `bin/kamal deploy -d prod`.

# Name of your application. Used to uniquely configure containers.
service: mail_on_rails

# Name of the container image (use your-user/app-name on external registries).
image: mail_on_rails

# The Rails app service: web UI + Action Mailbox ingress + Solid Queue.
# The SMTP/IMAP daemons are their own Kamal services deployed from their
# own repos (../mail_on_rails_smtp and ../mail_on_rails_imap, each with a
# config/deploy.yml and `bin/kamal deploy`). All three share this droplet
# and the local registry; the postgres accessory defined below belongs to
# this service alone.
#
# One role: Puma behind kamal-proxy (zero-downtime deploys, HTTPS on
# 443), serving the web UI, the relay ingress + private API the daemon
# services POST to, and the Solid Queue supervisor in-process
# (SOLID_QUEUE_IN_PUMA - Action Mailbox routing and outbound delivery
# need owner-level grants, and this is the only owner-privileged
# container).
servers:
  web:
    hosts:
      - 192.168.0.1
    env:
      clear:
        # Run the Solid Queue supervisor inside Puma (see config/puma.rb).
        SOLID_QUEUE_IN_PUMA: true

        # EHLO name for outbound delivery; must match this host's public mail
        # name (and ideally the droplet's PTR record).
        # To relay through a provider instead of delivering to MXes directly,
        # also set MAIL_ON_RAILS_SMARTHOST (host:port) and
        # MAIL_ON_RAILS_SMARTHOST_USER/_PASSWORD.
        MAIL_ON_RAILS_HELO_HOST: mail.example.com

        # Web-UI/mailer host (proxy.host below and Action Mailer link
        # generation in config/environments/production.rb).
        MAIL_ON_RAILS_WEB_HOST: www.example.com

        # Outbound DKIM signing: <domain>.pem private keys live on the storage
        # volume; the public halves are published as
        # <selector>._domainkey.<domain> TXT records (selector default: rail).
        MAIL_ON_RAILS_DKIM_DIR: /rails/storage/dkim

        # Set number of processes dedicated to Solid Queue (default: 1)
        # JOB_CONCURRENCY: 3

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# If used with Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
#
# Using an SSL proxy like this requires turning on config.assume_ssl and config.force_ssl in production.rb!
proxy:
  ssl: true
  host: www.example.com

# Give the containers time to boot: the web entrypoint runs db:prepare
# before /up turns healthy.
deploy_timeout: 120

# Where you keep your container images.
#
# This is the local registry container (kamal-docker-registry) on the machine
# you deploy from. The deploy host reaches it through a reverse SSH tunnel
# opened by .kamal/hooks/pre-deploy (closed again in post-deploy), so
# "localhost:5555" resolves to it on both ends. Docker allows plain HTTP for
# 127.0.0.0/8 registries, so no TLS or auth is needed.
registry:
  server: localhost:5555

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
  clear:
    # Database (postgres accessory below, reached over its Unix socket).
    # The rest of the connection config lives in config/database.yml.
    POSTGRES_USER: mail_on_rails
    POSTGRES_DB: mail_on_rails_production

    # The web role does not run the mail listeners (they're the smtp/imap
    # services) - MAIL_ON_RAILS_SERVERS=true would turn them back on inside
    # Puma (see config/puma.rb).

    # Set number of cores available to the application on each server (default: 1).
    # WEB_CONCURRENCY: 2

    # Log everything from Rails
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# e.g. "bin/kamal logs --grep ingress".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Certbot renewal daemon for the mail-port TLS cert (DNS-01 via Cloudflare,
# so it never needs port 80). Runs as the same uid as the app container, so
# every PEM it writes under /etc/letsencrypt is readable by the app without
# permission hooks. First issuance is a one-off `certonly` run (see
# /etc/letsencrypt/cloudflare.ini on the host for the API token, mode 600).
accessories:
  # PostgreSQL for the production databases (primary/cache/queue/cable -
  # bin/rails db:prepare in the entrypoint creates all four on first boot,
  # since POSTGRES_USER is the image's superuser). The app talks to it over
  # the Unix socket shared through the host directory below, so Postgres
  # never listens on the network.
  db:
    image: postgres:16
    host: 192.168.0.1
    env:
      clear:
        POSTGRES_USER: mail_on_rails
        POSTGRES_DB: mail_on_rails_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
      - socket/:/var/run/postgresql

  certbot:
    image: certbot/dns-cloudflare
    host: 192.168.0.1
    options:
      user: "1000:1000"
      entrypoint: /bin/sh
    cmd: -c "while true; do certbot renew --quiet; sleep 12h; done"
    volumes:
      - "/etc/letsencrypt:/etc/letsencrypt"
      - "/var/lib/letsencrypt:/var/lib/letsencrypt"
      - "/var/log/letsencrypt:/var/log/letsencrypt"

# Use a persistent storage volume for local Active Storage files (inbound
# mail blobs land there via Action Mailbox) and DKIM keys. The postgres socket dir is the accessory's
# "socket/" directory on the host (kamal puts accessory dirs under
# /root/<service>-<accessory>/).
volumes:
  - "mail_on_rails_storage:/rails/storage"
  - "/root/mail_on_rails-db/socket:/postgres/socket"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
